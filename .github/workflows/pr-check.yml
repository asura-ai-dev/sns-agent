name: PR Check
on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm --filter @sns-agent/web typecheck

      - name: Test
        run: pnpm run test

  issue-flow:
    name: Issue-driven checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect feature paths
        id: feat
        run: |
          paths=$(bash scripts/ci/detect-feature.sh origin/${{ github.base_ref }})
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          echo "$paths" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "features: $paths"

      - name: Check commit refs
        run: bash scripts/ci/check-commit-refs.sh origin/${{ github.base_ref }}

      - name: Check tickets closed
        if: steps.feat.outputs.paths != ''
        run: |
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            bash scripts/ci/check-tickets-closed.sh "$p"
          done <<< "${{ steps.feat.outputs.paths }}"

      - name: Run feature verify (optional)
        if: steps.feat.outputs.paths != ''
        run: |
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            bash scripts/ci/run-feature-verify.sh "$p"
          done <<< "${{ steps.feat.outputs.paths }}"
