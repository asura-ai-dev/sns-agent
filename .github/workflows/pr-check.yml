name: PR Check
on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm --filter @sns-agent/web typecheck

      - name: Test
        run: pnpm run test

  workstream-flow:
    name: Issue-driven checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect workstreams
        id: workstream
        run: |
          workstreams=$(bash scripts/ci/detect-workstream.sh origin/${{ github.base_ref }})
          echo "workstreams<<EOF" >> $GITHUB_OUTPUT
          echo "$workstreams" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "workstreams: $workstreams"

      - name: Check commit refs
        run: bash scripts/ci/check-commit-refs.sh origin/${{ github.base_ref }}

      - name: Check workstream tickets
        if: steps.workstream.outputs.workstreams != ''
        run: |
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            bash scripts/ci/check-workstream-tickets.sh "$p"
          done <<< "${{ steps.workstream.outputs.workstreams }}"

      - name: Run workstream verify (optional)
        if: steps.workstream.outputs.workstreams != ''
        run: |
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            bash scripts/ci/run-workstream-verify.sh "$p"
          done <<< "${{ steps.workstream.outputs.workstreams }}"
